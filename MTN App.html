<script type="text/babel">
const {useState:uS,useEffect:uE,useRef:uR,useMemo:uM} = React;
const {TICKERS,WATCHLIST_DATA,TRADES_DATA,fmtPrice,fmtPct,GRADE_STYLE,TIER_STYLE,NAV_STEPS} = window;

function Badge({grade,tier}){
  const s = tier ? TIER_STYLE[tier] : GRADE_STYLE[grade];
  if(!s) return null;
  return <span style={{background:s.bg,border:`1px solid ${s.border}`,color:s.text,borderRadius:4,padding:'1px 7px',fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>{s.label}</span>;
}
function Card({children,style:sty,onClick}){
  return <div onClick={onClick} style={{background:'var(--c3)',border:'1px solid var(--b1)',borderRadius:10,padding:16,...sty}}>{children}</div>;
}
function MetricCard({label,value,sub,color}){
  return(
    <div style={{background:'var(--c3)',border:'1px solid var(--b1)',borderRadius:10,padding:'14px 16px'}}>
      <div style={{fontSize:10,fontWeight:700,color:'var(--t3)',letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:8}}>{label}</div>
      <div style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:20,color:color||'var(--t1)'}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:'var(--t2)',marginTop:4}}>{sub}</div>}
    </div>
  );
}
function TrendDots({t}){
  return(
    <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
      {[t.above50,t.above150,t.above200].map((ok,i)=>(
        <div key={i} title={['50일','150일','200일'][i]+'선'} style={{width:6,height:6,borderRadius:'50%',background:ok?'var(--em)':'var(--b2)'}}/>
      ))}
    </div>
  );
}
function PageHeader({step,eyebrow,title,desc,children}){
  return(
    <div style={{marginBottom:18}}>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <p style={{fontSize:10,fontWeight:700,letterSpacing:'0.1em',color:'var(--em)',textTransform:'uppercase',marginBottom:6}}>STEP {step} · {eyebrow}</p>
          <h1 style={{fontSize:22,fontWeight:800,color:'var(--t1)',letterSpacing:'-0.02em',lineHeight:1.2}}>{title}</h1>
          <p style={{marginTop:6,color:'var(--t2)',fontSize:12,maxWidth:580,lineHeight:1.6}}>{desc}</p>
        </div>
        {children}
      </div>
    </div>
  );
}
function FlowBanner({currentKey}){
  const idx = NAV_STEPS.findIndex(s=>s.key===currentKey);
  return(
    <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:18,background:'var(--c3)',border:'1px solid var(--b1)',borderRadius:8,padding:'7px 14px',overflowX:'auto',flexWrap:'nowrap'}}>
      {NAV_STEPS.map((s,i)=>{
        const isActive=s.key===currentKey, isDone=i<idx;
        return(
          <React.Fragment key={s.key}>
            {i>0&&<div style={{width:20,height:1,background:isDone?'var(--em)':'var(--b1)',flexShrink:0,margin:'0 2px'}}/>}
            <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0,padding:'3px 8px',borderRadius:5,background:isActive?'rgba(16,185,129,.12)':'transparent',border:isActive?'1px solid rgba(16,185,129,.3)':'1px solid transparent'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:9,fontWeight:700,color:isActive||isDone?'var(--em)':'var(--t3)'}}>{s.step}</span>
              <span style={{fontSize:10,fontWeight:isActive?700:400,color:isActive?'var(--t1)':isDone?'var(--t2)':'var(--t3)',whiteSpace:'nowrap'}}>{s.label}</span>
              {isDone&&<span style={{fontSize:9,color:'var(--em)'}}>✓</span>}
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

function TopNav({page,setPage,subPage,setSubPage}){
  const market=[['SPY','+0.82%',true],['KOSPI','-0.31%',false],['QQQ','+1.24%',true],['DXY','+0.11%',true]];
  const cur = NAV_STEPS.find(s=>s.key===page);
  return(
    <div style={{position:'sticky',top:0,zIndex:100,background:'var(--c1)',borderBottom:'1px solid var(--b1)'}}>
      {/* Main bar */}
      <div style={{display:'flex',alignItems:'stretch',height:46,borderBottom:'1px solid var(--b1)'}}>
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 18px',borderRight:'1px solid var(--b1)',flexShrink:0}}>
          <span style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:15,color:'var(--em)',letterSpacing:'-0.03em'}}>MTN</span>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'var(--em)',boxShadow:'0 0 6px var(--em)'}}/>
            <span style={{fontSize:9,color:'var(--em)',fontWeight:700,letterSpacing:'0.1em'}}>LIVE</span>
          </div>
        </div>
        {/* Steps */}
        <div style={{display:'flex',flex:1,overflowX:'auto'}}>
          {NAV_STEPS.map(s=>{
            const active=s.key===page;
            return(
              <button key={s.key} onClick={()=>{setPage(s.key);if(s.tabs.length)setSubPage(s.tabs[0]);}} style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'flex-start',padding:'0 16px',background:'none',border:'none',borderBottom:active?'2px solid var(--em)':'2px solid transparent',cursor:'pointer',flexShrink:0,gap:2}}>
                <span style={{fontSize:9,color:active?'var(--em)':'var(--t3)',fontWeight:700,letterSpacing:'0.08em',fontFamily:'JetBrains Mono'}}>{s.step}</span>
                <span style={{fontSize:12,color:active?'var(--t1)':'var(--t2)',fontWeight:active?700:500}}>{s.label}</span>
              </button>
            );
          })}
        </div>
        {/* Market strip */}
        <div style={{display:'flex',alignItems:'stretch',borderLeft:'1px solid var(--b1)',flexShrink:0}}>
          {market.map(([n,v,up])=>(
            <div key={n} style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:'0 12px',borderRight:'1px solid var(--b1)',gap:2}}>
              <span style={{fontSize:9,color:'var(--t3)',fontWeight:700,letterSpacing:'0.07em'}}>{n}</span>
              <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:up?'var(--em)':'var(--ro)',fontWeight:600}}>{v}</span>
            </div>
          ))}
          <div style={{display:'flex',alignItems:'center',padding:'0 14px',fontFamily:'JetBrains Mono',fontSize:11,color:'var(--t3)'}}>09:31 KST</div>
        </div>
      </div>
      {/* Sub-tabs */}
      {cur&&cur.tabs.length>0&&(
        <div style={{display:'flex',alignItems:'stretch',background:'var(--c0)',height:33,padding:'0 18px',gap:0}}>
          {cur.tabs.map(tab=>{
            const active=subPage===tab;
            return(
              <button key={tab} onClick={()=>setSubPage(tab)} style={{background:'none',border:'none',borderBottom:active?'2px solid var(--em)':'2px solid transparent',color:active?'var(--t1)':'var(--t2)',fontSize:11,fontWeight:active?700:400,padding:'0 14px',cursor:'pointer',whiteSpace:'nowrap'}}>
                {tab}
              </button>
            );
          })}
          <div style={{flex:1}}/>
          <div style={{display:'flex',alignItems:'center',fontSize:10,color:'var(--t3)',fontStyle:'italic'}}>{cur.sub}</div>
        </div>
      )}
    </div>
  );
}

Object.assign(window,{Badge,Card,MetricCard,TrendDots,PageHeader,FlowBanner,TopNav});
</script>

              {[['QQQ/SPY','기술주 쏠림','QQQ +1.24% vs SPY +0.82%','빅테크 주도 장세','var(--em)'],['IWM/SPY','중소형 순환매','IWM +0.41% vs SPY +0.82%','대형주 집중, 소형주 약세','var(--am)'],['HYG/IEF','신용 스프레드','HYG +0.31% vs IEF -0.18%','Risk-ON 확연','var(--em)']].map(([label,sub,detail,desc,c])=>(
                <div key={label} style={{padding:'10px 12px',background:'var(--c4)',borderRadius:8,border:`1px solid ${c}22`}}>

  );
}

/* ── 3. VCP Scanner ─────────────────────────────────────────── */
function VCPScannerPage(){
  const [filter,setFilter]=us3('all');
  const [sort,setSort]=us3('rs');
  const [viewMode,setViewMode]=us3('web');
  const [scanning,setScanning]=us3(false);
  const [progress,setProgress]=us3(0);
  const [stage,setStage]=us3('');
  const [hasData,setHasData]=us3(true);
  const [selected,setSelected]=us3(new Set());
  const [drilldown,setDrilldown]=us3(null);
  const scanRef=ur3(null);
  const STAGES=['유니버스 API 조회 중...','KIS 가격 데이터 수집 중...','Yahoo Finance fallback...','벤치마크 조회 중...','SEPA/VCP 계산 중...'];
  const startScan=()=>{
    setScanning(true);setProgress(0);setStage(STAGES[0]);setHasData(false);
    let p=0,si=0;
    scanRef.current=setInterval(()=>{
      p+=Math.random()*4+2;si=Math.min(Math.floor(p/21),STAGES.length-1);
      setStage(STAGES[si]);setProgress(Math.min(p,100));
      if(p>=100){clearInterval(scanRef.current);setScanning(false);setHasData(true);setStage('완료');}
    },90);
  };
  const results=um3(()=>{
    let list=[...TICKERS];
    if(filter==='recommended')list=list.filter(r=>r.grade==='recommended');
    else if(filter==='partial')list=list.filter(r=>r.grade==='partial');
    else if(filter==='near52')list=list.filter(r=>r.near52);
    if(sort==='rs')list.sort((a,b)=>b.rs-a.rs);
    else if(sort==='chg')list.sort((a,b)=>b.chg-a.chg);
    else if(sort==='vol')list.sort((a,b)=>b.vol-a.vol);
    return list;
  },[filter,sort]);
  const toggle=t=>setSelected(p=>{const n=new Set(p);if(n.has(t))n.delete(t);else if(n.size<10)n.add(t);return n;});
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <FlowBanner currentKey="scanner"/>
      <PageHeader step="02" eyebrow="종목 발굴 / VCP 스캐너" title="VCP 마스터 스캐너" desc="SEPA/VCP 조건과 예외 신호를 함께 판단해 콘테스트 비교 후보를 만듭니다.">
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',background:'var(--c3)',border:'1px solid var(--b1)',borderRadius:7,padding:2}}>
            {[['web','표보기'],['app','카드']].map(([m,l])=>(
              <button key={m} onClick={()=>setViewMode(m)} style={{padding:'5px 12px',borderRadius:5,border:'none',cursor:'pointer',background:viewMode===m?'var(--em)':'transparent',color:viewMode===m?'#000':'var(--t2)',fontSize:11,fontWeight:700}}>{l}</button>
            ))}
          </div>
          <button onClick={scanning?()=>{clearInterval(scanRef.current);setScanning(false);}:startScan} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 18px',background:scanning?'rgba(244,63,94,.1)':'var(--em)',border:scanning?'1px solid var(--ro)':'none',borderRadius:8,color:scanning?'var(--ro)':'#000',fontWeight:700,fontSize:12,cursor:'pointer'}}>
            {scanning?'⏹ 중단':'▶ 스캔 시작'}
          </button>
        </div>
      </PageHeader>
      {/* Status */}
      <Card>
        <div style={{display:'flex',gap:16,flexWrap:'wrap',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>S&P 500</div>
            <div style={{color:'var(--t2)',fontSize:11,marginTop:3}}>미국 대형주 500종목을 스캔합니다.</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {[['Recommended',TICKERS.filter(r=>r.grade==='recommended').length,'var(--em)'],['Partial',TICKERS.filter(r=>r.grade==='partial').length,'var(--am)'],['Error',0,'var(--ro)']].map(([l,n,c])=>(
              <div key={l} style={{padding:'7px 14px',borderRadius:7,background:`${c}11`,border:`1px solid ${c}33`,textAlign:'center'}}>
                <div style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:16,color:c}}>{n}</div>
                <div style={{fontSize:9,color:c,opacity:.8,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        {scanning&&(
          <div style={{marginTop:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:11}}>
              <span style={{color:'var(--em)',fontWeight:600}}>{stage}</span>
              <span style={{fontFamily:'JetBrains Mono',color:'var(--t2)'}}>{Math.round(progress)}%</span>
            </div>
            <div style={{height:5,background:'var(--c4)',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${progress}%`,background:'linear-gradient(90deg,#059669,var(--em))',borderRadius:3,transition:'width .15s'}}/>
            </div>
          </div>
        )}
      </Card>
      {/* Filters */}
      <div style={{display:'flex',gap:8,justifyContent:'space-between',flexWrap:'wrap',alignItems:'center',borderBottom:'1px solid var(--b1)',paddingBottom:12}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['all','전체'],['recommended','Recommended'],['partial','Partial'],['near52','52주 신고가 근접']].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} style={{padding:'4px 12px',borderRadius:20,border:'none',cursor:'pointer',background:filter===k?'var(--em)':'var(--c3)',color:filter===k?'#000':'var(--t2)',fontSize:11,fontWeight:600}}>{l}</button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:'var(--t3)'}}>정렬:</span>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{background:'transparent',border:'none',color:'var(--t2)',fontSize:11,outline:'none',cursor:'pointer'}}>
            {[['rs','RS 점수'],['chg','등락률'],['vol','거래량비']].map(([k,l])=><option key={k} value={k}>{l}</option>)}
          </select>
        </div>
      </div>
      {/* Table */}
      {hasData&&viewMode==='web'&&(
        <div style={{overflowX:'auto',borderRadius:10,border:'1px solid var(--b1)'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:820}}>
            <thead>
              <tr style={{background:'var(--c3)',borderBottom:'1px solid var(--b1)'}}>
                {['','종목','RS','현재가','등락률','ADR%','수축','거래량비','추세','등급'].map((h,i)=>(
                  <th key={i} style={{padding:'9px 12px',textAlign:i>1?'right':'left',color:'var(--t3)',fontSize:10,fontWeight:700,letterSpacing:'0.05em',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {results.map((r,i)=>{
                const sel=selected.has(r.ticker);
                return(
                  <tr key={r.ticker} onClick={()=>setDrilldown(r)} style={{background:sel?'rgba(16,185,129,.04)':i%2===0?'var(--c3)':'transparent',borderBottom:'1px solid var(--b1)',cursor:'pointer'}}>
                    <td style={{padding:'9px 12px'}} onClick={e=>{e.stopPropagation();toggle(r.ticker);}}>
                      <div style={{width:16,height:16,borderRadius:4,border:sel?'2px solid var(--em)':'2px solid var(--b2)',background:sel?'var(--em)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                        {sel&&<span style={{color:'#000',fontSize:9,fontWeight:900}}>✓</span>}
                      </div>
                    </td>
                    <td style={{padding:'9px 12px'}}>
                      <div style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:12}}>{r.ticker}</div>
                      <div style={{color:'var(--t3)',fontSize:10,marginTop:1}}>{r.name} · {r.sector}</div>
                    </td>
                    <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'JetBrains Mono',fontWeight:700,fontSize:13,color:r.rs>=90?'var(--em)':r.rs>=75?'var(--am)':'var(--t2)'}}>{r.rs}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'JetBrains Mono',fontSize:11}}>{fmtPrice(r.price,r.ticker)}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'JetBrains Mono',fontSize:11,color:r.chg>=0?'var(--em)':'var(--ro)',fontWeight:600}}>{fmtPct(r.chg)}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:'var(--t2)',fontSize:11}}>{r.adr}%</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:'var(--t2)',fontSize:11}}>{r.contraction}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'JetBrains Mono',fontSize:11,color:r.vol>=1.5?'var(--em)':'var(--t2)',fontWeight:r.vol>=1.5?700:400}}>{r.vol.toFixed(1)}×</td>
                    <td style={{padding:'9px 12px',textAlign:'right'}}><TrendDots t={r}/></td>
                    <td style={{padding:'9px 12px',textAlign:'right'}}><Badge grade={r.grade}/></td>
                  </tr>
                );
              })}

          </table>

      )}
      {hasData&&viewMode==='app'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
          {results.map(r=>(
            <Card key={r.ticker} style={{cursor:'pointer',padding:14}} onClick={()=>setDrilldown(r)}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <div>
                  <div style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:15}}>{r.ticker}</div>
                  <div style={{color:'var(--t3)',fontSize:10,marginTop:2}}>{r.name}</div>
                </div>
                <Badge grade={r.grade}/>

              <div style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:16}}>{fmtPrice(r.price,r.ticker)}</div>

    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')setTweaksOn(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaksOn(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const applyTweak=(k,v)=>{
    const n={...tweaks,[k]:v};setTweaks(n);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };

  const renderPage=()=>{
    if(page==='market') return sub==='매크로'?<MacroPage/>:<MasterFilterPage/>;
    if(page==='scanner') return sub==='VCP 스캐너'?<VCPScannerPage/>:<CANSLIMPage/>;
    if(page==='watchlist') return <WatchlistPage/>;
    if(page==='plan') return <PlanPage/>;
    if(page==='portfolio') return <PortfolioPage/>;
    if(page==='contest') return <ContestPage/>;
    if(page==='review') return sub==='대시보드'?<DashboardPage/>:<HistoryPage/>;
    return null;
  };

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--c2)'}}>
      <TopNav page={page} setPage={setPage} subPage={sub} setSubPage={setSub}/>
      <main style={{flex:1,padding:'20px 24px',paddingBottom:80,maxWidth:1440,margin:'0 auto',width:'100%'}}>
        {renderPage()}
      </main>

      {/* Tweaks */}
      {tweaksOn&&(
        <div style={{position:'fixed',bottom:20,right:20,zIndex:200,width:250,background:'var(--c3)',border:'1px solid var(--b2)',borderRadius:12,padding:16,boxShadow:'0 20px 40px rgba(0,0,0,.6)'}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:14,color:'var(--t1)'}}>Tweaks</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:6}}>매크로 레짐</div>
              <div style={{display:'flex',gap:3}}>
                {['RISK_ON','NEUTRAL','RISK_OFF'].map(v=>(
                  <button key={v} onClick={()=>applyTweak('macroRegime',v)} style={{flex:1,padding:'5px 0',borderRadius:5,border:'none',cursor:'pointer',fontSize:9,fontWeight:700,background:tweaks.macroRegime===v?(v==='RISK_ON'?'var(--em)':v==='NEUTRAL'?'var(--am)':'var(--ro)'):'var(--c4)',color:tweaks.macroRegime===v?'#000':'var(--t2)'}}>{v.replace('_','-')}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:6}}>마스터 필터 상태</div>
              <div style={{display:'flex',gap:3}}>
                {['GREEN','YELLOW','RED'].map(v=>(
                  <button key={v} onClick={()=>applyTweak('marketState',v)} style={{flex:1,padding:'5px 0',borderRadius:5,border:'none',cursor:'pointer',fontSize:10,fontWeight:700,background:tweaks.marketState===v?(v==='GREEN'?'var(--em)':v==='YELLOW'?'var(--am)':'var(--ro)'):'var(--c4)',color:tweaks.marketState===v?'#000':'var(--t2)'}}>{v}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:6}}>활성 페이지 이동</div>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {NAV_STEPS.map(s=>(
                  <button key={s.key} onClick={()=>{setPage(s.key);if(s.tabs.length)setSub(s.tabs[0]);}} style={{padding:'5px 10px',borderRadius:5,border:'none',cursor:'pointer',background:page===s.key?'var(--b2)':'var(--c4)',color:page===s.key?'var(--t1)':'var(--t2)',fontSize:10,fontWeight:page===s.key?700:400,textAlign:'left'}}>
                    {s.step} · {s.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
